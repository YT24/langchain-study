# RAG 向量检索配置

# Embedding 模型配置
embedding:
  model: "BAAI/bge-small-zh-v1.5"
  dimension: 512
  cache_dir: ".hf_cache"

# ChromaDB 配置
chroma:
  persist_directory: ".chroma"

# RAG 检索参数
retrieval:
  # 工具检索
  tool_top_k: 3
  tool_similarity_threshold: 0.5
  # 知识检索
  knowledge_top_k: 3
  knowledge_similarity_threshold: 0.5

# 长期记忆配置
memory:
  top_k: 3
  summary_threshold: 5  # 轮次阈值，达到该阈值生成摘要
  similarity_threshold: 0.5  # 记忆召回相似度阈值
