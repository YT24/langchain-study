# RAG 向量检索配置

# Embedding 模型配置
embedding:
  model: "BAAI/bge-small-zh-v1.5"
  dimension: 512
  cache_dir: ".hf_cache"

# ChromaDB 配置
chroma:
  persist_directory: ".chroma"

# RAG 检索参数
retrieval:
  # 工具检索
  tool_top_k: 3
  tool_similarity_threshold: 0.5
  # 知识检索
  knowledge_top_k: 3
  knowledge_similarity_threshold: 0.3
