# Agent 主配置文件

# DeepSeek LLM 配置
deepseek:
  api_key: "${DEEPSEEK_API_KEY}"
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  temperature: 0.7

# Backend API 配置
backend:
  url: "http://localhost:8080"
  timeout: 30

# Agent 服务配置
agent:
  port: 5001

# Memory 配置
memory:
  max_token_limit: 2000

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(filename)s:%(lineno)d - %(message)s"
  date_format: "%H:%M:%S"
