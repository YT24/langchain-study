# Agent 主配置文件

# DeepSeek LLM 配置
deepseek:
  api_key: "${DEEPSEEK_API_KEY}"
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  temperature: 0.7

# 数据库配置
database:
  host: "${DB_HOST:localhost}"
  port: "${DB_PORT:3306}"
  user: "${DB_USER:root}"
  password: "${DB_PASSWORD:}"
  name: "${DB_NAME:fff}"

# Agent 服务配置
agent:
  port: 5001
  verbose_logs: false

# Embedding Provider 配置
embedding:
  provider: "local"
  base_url: ""

# Memory 配置
memory:
  max_token_limit: 2000

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(filename)s:%(lineno)d - %(message)s"
  date_format: "%H:%M:%S"
