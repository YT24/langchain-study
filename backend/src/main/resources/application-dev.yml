server:
  port: 8080

jwt:
  secret: agent-secret-key-for-jwt-token-generation-minimum-256-bits-long-enough
  expiration: 86400000

spring:
  datasource:
    url: jdbc:mysql://localhost:3300/fff?useUnicode=true&characterEncoding=utf-8
    username: root
    password: root1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    drop-first: false

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.agent.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
